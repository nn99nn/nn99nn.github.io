<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>捌伍添第 85TD</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400&display=swap" rel="stylesheet">
<script src="menu-data.js"></script>
<style>
:root {
  --cream:    #f8f4ea;
  --cream2:   #f0e9d4;
  --gold:     #c8a45a;
  --gold-dim: rgba(200,164,90,0.22);
  --gold-glow:rgba(200,164,90,0.08);
  --charcoal: #2c2a27;
  --mid:      #8a806a;
  --left-w:   300px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: var(--cream);
  color: var(--charcoal);
  font-family: 'Noto Sans TC', sans-serif;
  -webkit-tap-highlight-color: transparent;
  overflow: hidden;
}

/* ===== HEADER ===== */
header {
  height: 60px;
  background: var(--cream);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 28px;
  flex-shrink: 0;
  position: relative;
  z-index: 10;
}

header::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent 0%, var(--gold) 30%, var(--gold) 70%, transparent 100%);
  opacity: 0.5;
}

.logo-wrap {
  display: flex;
  align-items: center;
  gap: 14px;
}

.logo-wrap img {
  height: 38px;
  width: auto;
  mix-blend-mode: multiply;
}

.logo-text {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.logo-zh {
  font-size: 0.94rem;
  letter-spacing: 5px;
  color: var(--gold);
  font-weight: 400;
  line-height: 1;
}

.logo-en {
  font-size: 0.56rem;
  letter-spacing: 4px;
  color: var(--mid);
  font-family: 'Helvetica Neue', Arial, sans-serif;
  line-height: 1;
}

/* Header right controls */
.header-controls {
  display: flex;
  align-items: center;
  gap: 10px;
}

/* Font size toggle */
.font-toggle {
  display: flex;
  align-items: center;
  border: 1px solid var(--gold-dim);
  border-radius: 4px;
  overflow: hidden;
}

.font-icon {
  padding: 7px 9px;
  color: var(--mid);
  font-size: 0.875rem;
  line-height: 1;
  pointer-events: none;
  border-right: 1px solid var(--gold-dim);
  display: flex;
  align-items: center;
  height: 100%;
}

.font-btn {
  padding: 7px 12px;
  border: none;
  border-left: 1px solid var(--gold-dim);
  background: transparent;
  color: var(--mid);
  cursor: pointer;
  font-size: 0.875rem;
  font-family: 'Helvetica Neue', Arial, sans-serif;
  font-weight: 500;
  transition: all 0.2s;
  line-height: 1;
}

.font-btn:hover { background: var(--gold-glow); color: var(--gold); }

/* Font size levels — only text scales, layout stays fixed */
html        { font-size: 18px; }
html.fs-1   { font-size: 18px; }
html.fs-2   { font-size: 20px; }
html.fs-3   { font-size: 22px; }
html.fs-4   { font-size: 24px; }
html.fs-5   { font-size: 27px; }
html.fs-6   { font-size: 30px; }

.lang-toggle {
  display: flex;
  border: 1px solid var(--gold-dim);
  border-radius: 4px;
  overflow: hidden;
}

.lang-btn {
  padding: 7px 14px;
  border: none;
  border-right: 1px solid var(--gold-dim);
  background: transparent;
  color: var(--mid);
  font-size: 0.69rem;
  letter-spacing: 1px;
  cursor: pointer;
  font-family: 'Noto Sans TC', sans-serif;
  transition: all 0.2s;
}

.lang-btn:last-child { border-right: none; }

.lang-btn.active {
  background: var(--gold);
  color: #fff;
  letter-spacing: 0.5px;
}

.lang-btn:not(.active):hover {
  background: var(--gold-glow);
  color: var(--gold);
}

/* ===== APP LAYOUT ===== */
.app {
  height: calc(100vh - 60px);
  display: flex;
  overflow: hidden;
}

/* ===== LEFT PANEL ===== */
.left {
  width: var(--left-w);
  min-width: var(--left-w);
  background: var(--cream);
  border-right: 1px solid var(--gold-dim);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.left-top-bar {
  height: 3px;
  background: linear-gradient(90deg, var(--gold) 0%, var(--cream2) 100%);
  flex-shrink: 0;
}

.cat-scroll {
  flex: 1;
  overflow-y: auto;
  overscroll-behavior: contain;
}

.cat-scroll::-webkit-scrollbar { width: 3px; }
.cat-scroll::-webkit-scrollbar-thumb { background: var(--gold-dim); border-radius: 2px; }

/* Category */
.cat-item { border-bottom: 1px solid var(--gold-dim); }

.cat-hd {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px;
  cursor: pointer;
  transition: background 0.18s;
  user-select: none;
  min-height: 60px;
}

.cat-hd:hover, .cat-hd.open { background: var(--gold-glow); }

.cat-hd-names { display: flex; flex-direction: column; gap: 3px; }

.cat-name-main {
  font-size: 1rem;
  font-weight: 400;
  letter-spacing: 3px;
  color: var(--charcoal);
  line-height: 1;
}

.cat-hd.open .cat-name-main { color: var(--gold); }

.cat-name-sub {
  font-size: 0.625rem;
  letter-spacing: 2px;
  color: var(--mid);
  font-family: 'Helvetica Neue', Arial, sans-serif;
  font-style: italic;
  line-height: 1;
}

.cat-arrow {
  color: var(--gold);
  font-size: 0.56rem;
  transition: transform 0.25s;
  opacity: 0.7;
  flex-shrink: 0;
}

.cat-hd.open .cat-arrow { transform: rotate(180deg); }

/* Dish rows */
.dish-rows { display: none; background: rgba(200,164,90,0.03); }
.dish-rows.open { display: block; }

.dish-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 12px 20px 12px 28px;
  cursor: pointer;
  border-top: 1px solid rgba(200,164,90,0.07);
  transition: background 0.15s;
  min-height: 48px;
}

.dish-row:hover    { background: rgba(200,164,90,0.09); }
.dish-row.sel      { background: rgba(200,164,90,0.15); }

.dish-row-name {
  flex: 1;
  font-size: 0.844rem;
  letter-spacing: 1px;
  color: var(--charcoal);
  line-height: 1.4;
  min-width: 0;
}

.dish-row.sel .dish-row-name { color: var(--gold); }

.dish-row-price {
  font-size: 0.69rem;
  color: var(--mid);
  font-family: 'Helvetica Neue', Arial, sans-serif;
  white-space: nowrap;
  flex-shrink: 0;
}

/* Badges */
.badges { display: flex; gap: 3px; flex-shrink: 0; }
.badge {
  font-size: 0.56rem;
  padding: 1px 4px;
  border-radius: 2px;
  letter-spacing: 0.5px;
  font-family: 'Cormorant Garamond', serif;
}
.badge-sig   { background: rgba(200,164,90,0.2); color: var(--gold); border: 1px solid rgba(200,164,90,0.4); }
.badge-veg   { background: rgba(80,140,80,0.1);  color: #5a8a5a;    border: 1px solid rgba(80,140,80,0.3); }
.badge-lacto { background: rgba(80,140,80,0.1);  color: #5a8a5a;    border: 1px solid rgba(80,140,80,0.3); }
.badge-spicy { background: rgba(180,60,40,0.1);  color: #b43c28;    border: 1px solid rgba(180,60,40,0.3); }

/* Empty category hint */
.cat-empty {
  padding: 14px 28px;
  font-size: 0.69rem;
  color: var(--mid);
  font-style: italic;
  letter-spacing: 1px;
  opacity: 0.6;
  font-family: 'Cormorant Garamond', serif;
}

/* ===== RIGHT PANEL ===== */
.right {
  flex: 1;
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* Decorative corners */
.corner {
  position: absolute;
  width: 20px; height: 20px;
  border-color: var(--gold);
  border-style: solid;
  opacity: 0.35;
  pointer-events: none;
  z-index: 5;
}
.corner.tl { top: 12px; left: 12px; border-width: 1px 0 0 1px; }
.corner.tr { top: 12px; right: 12px; border-width: 1px 1px 0 0; }
.corner.bl { bottom: 12px; left: 12px; border-width: 0 0 1px 1px; }
.corner.br { bottom: 12px; right: 12px; border-width: 0 1px 1px 0; }

/* ===== INTRO PANEL ===== */
#intro-panel {
  flex: 1;
  position: relative;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}

.slide {
  position: absolute;
  inset: 0;
  opacity: 0;
  transition: opacity 1s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

.slide.active { opacity: 1; z-index: 1; }

.slide img   { width: 100%; height: 100%; object-fit: cover; }
.slide iframe { width: 100%; height: 100%; border: none; }

/* Default intro (no slides configured) */
.intro-default {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 0;
  padding: 60px;
  text-align: center;
  height: 100%;
  width: 100%;
}

.intro-monogram {
  height: 110px;
  width: auto;
  opacity: 0.45;
  margin-bottom: 28px;
  mix-blend-mode: multiply;
}

.intro-gold-line {
  width: 1px;
  height: 48px;
  background: linear-gradient(to bottom, transparent, var(--gold), transparent);
  margin: 20px auto;
}

.intro-title-zh {
  font-size: 2.75rem;
  letter-spacing: 14px;
  color: var(--gold);
  font-weight: 300;
  line-height: 1;
}

.intro-title-en {
  font-size: 0.75rem;
  letter-spacing: 8px;
  color: var(--mid);
  font-family: 'Helvetica Neue', Arial, sans-serif;
  margin-top: 10px;
}

.intro-copy {
  font-size: 0.75rem;
  color: var(--mid);
  letter-spacing: 2px;
  line-height: 2.6;
  margin-top: 8px;
  font-weight: 300;
}

.dish-notice {
  font-size: 0.6rem;
  color: var(--mid);
  opacity: 0.55;
  letter-spacing: 0.5px;
  line-height: 1.8;
  margin-top: auto;
  padding-top: 20px;
  font-weight: 300;
}

/* Slide dots */
.slide-dots {
  position: absolute;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 10px;
  z-index: 10;
}

.dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  border: 1px solid var(--gold);
  background: transparent;
  cursor: pointer;
  transition: background 0.3s;
}

.dot.active { background: var(--gold); }

/* ===== DISH PANEL ===== */
#dish-panel {
  flex: 1;
  display: none;
  flex-direction: column;
  overflow: hidden;
}

#dish-panel.active { display: flex; }

.dish-media {
  flex-shrink: 0;
  height: 54%;
  background: #1a1510;
  position: relative;
  overflow: hidden;
}

.dish-media img {
  width: 100%; height: 100%;
  object-fit: cover;
}

.dish-media iframe {
  width: 100%; height: 100%;
  border: none;
}

.media-placeholder {
  width: 100%; height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, #1a1510 0%, #2a2018 100%);
}

.media-placeholder img {
  height: 90px; width: auto;
  opacity: 0.18;
  object-fit: contain;
}

/* Back button */
.back-btn {
  position: absolute;
  top: 14px; left: 14px;
  z-index: 10;
  background: rgba(0,0,0,0.45);
  border: 1px solid rgba(200,164,90,0.4);
  color: var(--gold);
  font-size: 0.69rem;
  letter-spacing: 2px;
  padding: 6px 14px;
  border-radius: 3px;
  cursor: pointer;
  font-family: 'Helvetica Neue', Arial, sans-serif;
  transition: background 0.2s;
}

.back-btn:hover { background: rgba(0,0,0,0.65); }

.dish-nav {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  z-index: 10;
  background: rgba(0,0,0,0.35);
  border: 1px solid rgba(200,164,90,0.3);
  color: var(--gold);
  font-size: 1.5rem;
  width: 30px;
  height: 48px;
  border-radius: 3px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Helvetica Neue', Arial, sans-serif;
  line-height: 1;
  padding: 0;
  transition: background 0.2s;
}
.dish-nav:hover { background: rgba(0,0,0,0.55); }
.dish-nav-prev { left: 10px; }
.dish-nav-next { right: 10px; }

@media (min-width: 768px) {
  .back-btn { display: none; }
}

/* Dish info */
.dish-info {
  flex: 1;
  min-height: 0;
  overflow-y: auto;
  padding: 28px 44px 28px;
  background: var(--cream);
  border-top: 1px solid var(--gold-dim);
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.dish-info::-webkit-scrollbar { width: 3px; }
.dish-info::-webkit-scrollbar-thumb { background: var(--gold-dim); }

.dish-names { display: flex; flex-direction: column; gap: 5px; }

.name-primary {
  font-size: 1.875rem;
  font-weight: 400;
  letter-spacing: 4px;
  color: var(--charcoal);
  line-height: 1.2;
}

[data-lang="en"] .name-primary,
[data-lang="ja"] .name-primary { font-size: 1.594rem; }

.name-secondary {
  font-size: 0.875rem;
  letter-spacing: 2px;
  color: var(--mid);
  font-family: 'Helvetica Neue', Arial, sans-serif;
  font-style: italic;
  line-height: 1.4;
}

.dish-price {
  display: flex;
  align-items: baseline;
  gap: 5px;
  padding-top: 4px;
}

.price-nt {
  font-size: 0.69rem;
  letter-spacing: 1px;
  color: var(--gold);
  font-family: 'Helvetica Neue', Arial, sans-serif;
}

.price-num {
  font-size: 1.625rem;
  color: var(--gold);
  font-family: 'Helvetica Neue', Arial, sans-serif;
  font-weight: 400;
  letter-spacing: 1px;
}

.price-per {
  font-size: 0.76rem;
  color: var(--mid);
  letter-spacing: 1.5px;
}

.dish-price-multi {
  display: flex;
  gap: 20px;
  align-items: flex-end;
  padding-top: 4px;
}
.dish-price-multi .dish-price {
  flex-direction: column;
  align-items: flex-start;
  gap: 2px;
  padding-top: 0;
}
.dish-price-multi .price-inner {
  display: flex;
  align-items: baseline;
  gap: 5px;
}
.price-label {
  font-size: 0.72rem;
  color: var(--mid);
  letter-spacing: 1px;
  font-family: 'Noto Sans TC', sans-serif;
}

.dish-divider {
  width: 48px;
  height: 1px;
  background: linear-gradient(to right, var(--gold), transparent);
  margin: 2px 0;
}

.dish-desc {
  font-size: 0.8125rem;
  color: var(--mid);
  line-height: 1.1;
  letter-spacing: 0.5px;
  font-weight: 300;
}

/* ===== PORTRAIT IMAGE LAYOUT ===== */
#dish-panel.portrait {
  flex-direction: row;
}

#dish-panel.portrait .dish-media {
  width: 42%;
  height: 100%;
  flex-shrink: 0;
}

#dish-panel.portrait .dish-info {
  border-top: none;
  border-left: 1px solid var(--gold-dim);
}

#dish-panel.portrait .dish-media img {
  object-fit: contain;
  background: #1a1510;
}

/* ===== PDF PANEL ===== */
#pdf-panel {
  flex: 1;
  display: none;
  flex-direction: column;
  overflow: hidden;
}

#pdf-panel.active { display: flex; }

.pdf-topbar {
  flex-shrink: 0;
  height: 44px;
  background: var(--cream);
  border-bottom: 1px solid var(--gold-dim);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 12px;
}

.pdf-back-btn {
  display: none;
  background: transparent;
  border: 1px solid var(--gold-dim);
  color: var(--gold);
  font-size: 0.69rem;
  letter-spacing: 2px;
  padding: 5px 12px;
  border-radius: 3px;
  cursor: pointer;
  font-family: 'Helvetica Neue', Arial, sans-serif;
  transition: background 0.2s;
}
.pdf-back-btn:hover { background: var(--gold-glow); }

.pdf-title {
  font-size: 0.8rem;
  letter-spacing: 3px;
  color: var(--mid);
}

#pdf-canvas-container {
  flex: 1;
  overflow: hidden;
  background: var(--cream2);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 12px;
  min-height: 0;
}

#pdf-canvas-container img {
  max-width: 100%;
  max-height: 100%;
  width: auto;
  height: auto;
  object-fit: contain;
  display: block;
  box-shadow: 0 4px 24px rgba(44,42,39,0.13);
}

.pdf-zoom-ctrl {
  display: flex;
  align-items: center;
  border: 1px solid var(--gold-dim);
  border-radius: 4px;
  overflow: hidden;
  margin-left: auto;
  flex-shrink: 0;
}

.pdf-zoom-btn {
  padding: 5px 12px;
  border: none;
  border-left: 1px solid var(--gold-dim);
  background: transparent;
  color: var(--mid);
  font-size: 0.8rem;
  cursor: pointer;
  font-family: 'Helvetica Neue', Arial, sans-serif;
  font-weight: 500;
  line-height: 1;
  transition: all 0.2s;
  white-space: nowrap;
}

.pdf-zoom-btn:first-child { border-left: none; }
.pdf-zoom-btn:hover { background: var(--gold-glow); color: var(--gold); }
.pdf-zoom-btn.active { background: var(--gold); color: #fff; }

@media (hover: none) {
  .pdf-zoom-ctrl { display: none; }
}

/* ===== MOBILE (<768px) ===== */
@media (max-width: 767px) {
  html, body { overflow: auto; }

  .app {
    flex-direction: column;
    height: auto;
    overflow: visible;
  }

  .left {
    width: 100%;
    min-width: unset;
    border-right: none;
    border-bottom: 1px solid var(--gold-dim);
    overflow: visible;
  }

  .cat-scroll { overflow: visible; }

  .right {
    min-height: 80vw;
  }

  #intro-panel, #dish-panel { min-height: 70vw; }

  .dish-media { height: 52vw; min-height: 220px; }

  .dish-info { padding: 20px 24px; padding-bottom: max(20px, env(safe-area-inset-bottom)); }

  .name-primary { font-size: 1.5rem; }

  .intro-title-zh { font-size: 2rem; }

  .corner { display: none; }

  header {
    padding: 0 16px;
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 200;
  }
  .app { padding-top: 60px; }
  .logo-zh { letter-spacing: 2px; }
  .logo-en { letter-spacing: 1px; }
  .font-icon { display: none; }

  .pdf-back-btn { display: block; }

  body.dish-open { overflow: hidden; }
  body.dish-open .left { display: none; }
  body.dish-open .right {
    position: fixed;
    top: 60px; left: 0; right: 0; bottom: 0;
    min-height: unset;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  body.dish-open #dish-panel { min-height: unset; height: 100%; }

  body.pdf-open { overflow: hidden; }
  body.pdf-open .left { display: none; }
  body.pdf-open .right {
    position: fixed;
    top: 60px; left: 0; right: 0; bottom: 0;
    min-height: unset;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  body.pdf-open #pdf-panel { min-height: unset; height: 100%; }

}
</style>
</head>
<body>

<header>
  <div class="logo-wrap">
    <img src="85%20Logo.png" alt="85TD">
    <div class="logo-text">
      <div class="logo-zh">捌伍添第</div>
      <div class="logo-en">85TD · TAIPEI 101</div>
    </div>
  </div>
  <div class="header-controls">
    <div class="font-toggle">
      <span class="font-icon">Aa</span>
      <button class="font-btn" onclick="stepFont(-1)">−</button>
      <button class="font-btn" onclick="stepFont(+1)">+</button>
    </div>
    <div class="lang-toggle">
      <button class="lang-btn active" data-lang="zh" onclick="setLang('zh')">中文</button>
      <button class="lang-btn"        data-lang="en" onclick="setLang('en')">EN</button>
      <button class="lang-btn"        data-lang="ja" onclick="setLang('ja')">日本語</button>
    </div>
  </div>
</header>

<div class="app">

  <!-- LEFT: Category navigation -->
  <div class="left">
    <div class="left-top-bar"></div>
    <div class="cat-scroll" id="cat-scroll"></div>
  </div>

  <!-- RIGHT: Display area -->
  <div class="right">
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>

    <!-- Intro / carousel -->
    <div id="intro-panel"></div>

    <!-- PDF set meal -->
    <div id="pdf-panel">
      <div class="pdf-topbar">
        <button class="pdf-back-btn" id="pdf-back-btn" onclick="showIntro()">← 返回</button>
        <span class="pdf-title" id="pdf-title"></span>
        <div class="pdf-zoom-ctrl">
          <button class="pdf-zoom-btn active" data-size="fit" onclick="setPdfSize('fit')">Fit</button>
          <button class="pdf-zoom-btn" data-size="60" onclick="setPdfSize(60)">60%</button>
          <button class="pdf-zoom-btn" data-size="80" onclick="setPdfSize(80)">80%</button>
          <button class="pdf-zoom-btn" data-size="100" onclick="setPdfSize(100)">100%</button>
        </div>
      </div>
      <div id="pdf-canvas-container"></div>
    </div>

    <!-- Dish detail -->
    <div id="dish-panel">
      <div class="dish-media" id="dish-media">
        <button class="back-btn" onclick="showIntro()">← 返回</button>
        <button class="dish-nav dish-nav-prev" id="dish-prev" onclick="navDish(-1)">‹</button>
        <button class="dish-nav dish-nav-next" id="dish-next" onclick="navDish(+1)">›</button>
      </div>
      <div class="dish-info" id="dish-info"></div>
    </div>
  </div>

</div>

<script>
// ── State ──────────────────────────────────────────────────
let lang        = 'zh';
let pdfZoom     = 1.0;
let pdfSizeMode = 'fit';
document.documentElement.setAttribute('data-lang', 'zh');
let selDishId   = null;
let slideIdx    = 0;
let slideTimer  = null;
const openCats  = new Set();

// ── Translations ───────────────────────────────────────────
const UI = {
  back:    { zh: '← 返回', en: '← Back', ja: '← 戻る' },
  per:     { zh: '每位', en: 'per person', ja: '一人様' },
  empty:   { zh: '敬請期待', en: 'Coming soon', ja: '近日公開' },
  notice:  {
    zh: '所有價格為新台幣（含稅），外加10%服務費。若您有任何飲食上的特殊需要，務請告知我們的服務人員。',
    en: 'All prices are in New Taiwan Dollars (tax included), subject to a 10% service charge. Please inform our staff of any dietary requirements or allergies.',
    ja: '表示価格はすべて新台湾ドル（税込）です。別途10%のサービス料を申し受けます。食事に関する特別なご要望はスタッフまでお申し付けください。',
  },
};

// ── Helpers ────────────────────────────────────────────────
const t = obj => (obj && (obj[lang] || obj.zh || obj.en || ''));

function findDish(id) {
  for (const cat of MENU.categories) {
    const d = cat.dishes.find(x => x.id === id);
    if (d) return d;
  }
  return null;
}

function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtDesc(s) {
  const bold = [
    '材料：','過敏源：','豬肉產地：','牛肉產地：','羊肉產地：','豆製品：','可選：',
    'Ingredients:','Allergens:','Pork:','Beef:','Lamb:','Soy products:','Choice of:',
    '食材：','アレルゲン：','豚肉産地：','牛肉産地：','ラム産地：','大豆製品：','調理法選択：',
  ];
  let out = escHtml(s);
  bold.forEach(k => {
    out = out.replace(new RegExp(escHtml(k), 'g'), `<strong style="font-size:calc(1em + 1px)">${escHtml(k)}</strong>`);
  });
  out = out.replace(/⚠[^　]*/g, m => `<strong style="font-size:calc(1em + 1px)">${m}</strong>`);
  return out;
}

// 把菜名尾端的（...）縮小 30%
function fmtName(str) {
  const m = str.match(/^(.*?)(（[^）]+）|\([^)]+\))$/);
  if (m) return escHtml(m[1]) + `<span style="font-size:0.7em">${escHtml(m[2])}</span>`;
  return escHtml(str);
}

// ── Font size ──────────────────────────────────────────────
let fontLevel = 0;  // 0–5

function stepFont(dir) {
  fontLevel = Math.min(6, Math.max(0, fontLevel + dir));
  document.documentElement.classList.remove('fs-1', 'fs-2', 'fs-3', 'fs-4', 'fs-5', 'fs-6');
  if (fontLevel > 0) document.documentElement.classList.add('fs-' + fontLevel);
}

// ── Language ───────────────────────────────────────────────
function setLang(l) {
  lang = l;
  document.documentElement.setAttribute('data-lang', l);
  document.querySelectorAll('.lang-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.lang === l));
  document.querySelector('.back-btn').textContent = UI.back[lang];
  renderCats();
  if (selDishId) {
    const d = findDish(selDishId);
    if (d) renderDishInfo(d);
  }
}

// ── Category list ──────────────────────────────────────────
function renderCats() {
  const el = document.getElementById('cat-scroll');
  el.innerHTML = '';

  MENU.categories.forEach(cat => {
    const isOpen = openCats.has(cat.id);

    const item = document.createElement('div');
    item.className = 'cat-item';

    const sub = lang === 'en' ? (cat.name.zh || '')
              : lang === 'ja' ? (cat.name.en || '')
              : (cat.name.en || '');

    const hd = document.createElement('div');
    hd.className = 'cat-hd' + (isOpen ? ' open' : '');
    hd.innerHTML = `
      <div class="cat-hd-names">
        <div class="cat-name-main">${escHtml(t(cat.name))}</div>
        ${sub ? `<div class="cat-name-sub">${escHtml(sub)}</div>` : ''}
      </div>
      <span class="cat-arrow">▼</span>`;
    hd.onclick = () => {
      const wasOpen = openCats.has(cat.id);
      openCats.clear();
      if (!wasOpen) openCats.add(cat.id);
      renderCats();
      if (!wasOpen) {
        const scroll = document.getElementById('cat-scroll');
        const opened = scroll.querySelector('.cat-hd.open');
        if (opened) {
          const sr = scroll.getBoundingClientRect();
          const or = opened.getBoundingClientRect();
          scroll.scrollTo({ top: scroll.scrollTop + or.top - sr.top, behavior: 'smooth' });
        }
      }
    };

    const rows = document.createElement('div');
    rows.className = 'dish-rows' + (isOpen ? ' open' : '');

    if (cat.dishes.length === 0) {
      rows.innerHTML = `<div class="cat-empty">${UI.empty[lang]}</div>`;
    } else {
      cat.dishes.forEach(dish => {
        const row = document.createElement('div');
        row.className = 'dish-row' + (dish.id === selDishId ? ' sel' : '');
        row.dataset.dishId = dish.id;

        const badgeHtml = (dish.badge || []).map(b => {
          const labels = {
            zh: { sig: '招牌', veg: '素食', lacto: '蛋奶素', spicy: '辣' },
            en: { sig: 'Sig',  veg: 'Vegan', lacto: 'Lacto-ovo', spicy: 'Spicy' },
            ja: { sig: '看板', veg: 'ヴィーガン', lacto: '乳卵菜食', spicy: '辛' },
          };
          const l = labels[lang] || labels.zh;
          return `<span class="badge badge-${b}">${l[b] || b}</span>`;
        }).join('');

        row.innerHTML = `
          <div class="dish-row-name">${fmtName(t(dish.name))}</div>
          ${badgeHtml ? `<div class="badges">${badgeHtml}</div>` : ''}
          ${dish.prices ? `<div class="dish-row-price">NT ${dish.prices[0].price.toLocaleString()}+</div>` : dish.price ? `<div class="dish-row-price">NT ${dish.price.toLocaleString()}</div>` : ''}`;
        row.onclick = () => selectDish(dish);
        rows.appendChild(row);
      });
    }

    item.appendChild(hd);
    item.appendChild(rows);
    el.appendChild(item);
  });
}

// ── PDF zoom ───────────────────────────────────────────────
function setPdfSize(mode) {
  pdfSizeMode = mode;
  const img = document.querySelector('#pdf-canvas-container img');
  const c = document.getElementById('pdf-canvas-container');
  if (img) {
    if (mode === 'fit') {
      img.style.cssText = '';
      c.style.overflow = 'hidden';
      c.style.alignItems = 'center';
      pdfZoom = 1.0;
    } else {
      img.style.maxWidth = 'none';
      img.style.maxHeight = 'none';
      img.style.width = mode + '%';
      img.style.height = 'auto';
      c.style.overflow = 'auto';
      c.style.alignItems = 'flex-start';
    }
  }
  document.querySelectorAll('.pdf-zoom-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.size == mode));
}

function applyPdfZoom() {
  const img = document.querySelector('#pdf-canvas-container img');
  const c = document.getElementById('pdf-canvas-container');
  if (!img) return;
  if (pdfZoom <= 1.0) {
    pdfZoom = 1.0;
    img.style.cssText = '';
    c.style.overflow = 'hidden';
    c.style.alignItems = 'center';
  } else {
    img.style.maxWidth = 'none';
    img.style.maxHeight = 'none';
    img.style.width = (pdfZoom * 100) + '%';
    img.style.height = 'auto';
    c.style.overflow = 'auto';
    c.style.alignItems = 'flex-start';
  }
}

function initPdfTouch() {
  const c = document.getElementById('pdf-canvas-container');
  let pinchDist0 = 0, zoomStart = 1.0, lastTap = 0;

  function dist2(t) {
    return Math.hypot(t[0].clientX - t[1].clientX, t[0].clientY - t[1].clientY);
  }

  c.addEventListener('touchstart', e => {
    if (e.touches.length === 2) {
      e.preventDefault();
      pinchDist0 = dist2(e.touches);
      zoomStart = pdfZoom;
    } else if (e.touches.length === 1) {
      const now = Date.now();
      if (now - lastTap < 280) { setPdfSize('fit'); e.preventDefault(); }
      lastTap = now;
    }
  }, { passive: false });

  c.addEventListener('touchmove', e => {
    if (e.touches.length === 2) {
      e.preventDefault();
      pdfZoom = Math.min(3.0, Math.max(1.0, zoomStart * dist2(e.touches) / pinchDist0));
      applyPdfZoom();
    }
  }, { passive: false });
}

// ── Set meal image display ─────────────────────────────────
function renderPdf(url) {
  const container = document.getElementById('pdf-canvas-container');
  container.scrollTop = 0;
  const img = document.createElement('img');
  img.src = url;
  img.alt = '';
  container.innerHTML = '';
  container.appendChild(img);
  setPdfSize(pdfSizeMode);
}

// ── Nav arrows ─────────────────────────────────────────────
function navDish(dir) {
  if (!selDishId) return;
  const { prev, next } = getAdjacentDishes(selDishId);
  if (dir < 0 && prev) selectDish(prev);
  if (dir > 0 && next) selectDish(next);
}

function updateNavArrows() {
  const { prev, next } = selDishId ? getAdjacentDishes(selDishId) : { prev: null, next: null };
  const p = document.getElementById('dish-prev');
  const n = document.getElementById('dish-next');
  if (p) p.style.visibility = prev ? 'visible' : 'hidden';
  if (n) n.style.visibility = next ? 'visible' : 'hidden';
}

// ── Adjacent dish lookup (cross-category) ─────────────────
function getAdjacentDishes(id) {
  const all = MENU.categories.flatMap(cat => cat.dishes);
  const idx = all.findIndex(d => d.id === id);
  if (idx === -1) return { prev: null, next: null };
  return {
    prev: idx > 0 ? all[idx - 1] : null,
    next: idx < all.length - 1 ? all[idx + 1] : null,
  };
}

function findCatForDish(id) {
  return MENU.categories.find(cat => cat.dishes.some(d => d.id === id));
}

// ── Select dish ────────────────────────────────────────────
function selectDish(dish) {
  selDishId = dish.id;
  const cat = findCatForDish(dish.id);
  if (cat) { openCats.clear(); openCats.add(cat.id); }
  stopSlide();

  document.getElementById('intro-panel').style.display = 'none';

  if (dish.pdf) {
    document.getElementById('dish-panel').classList.remove('active');
    document.getElementById('pdf-panel').classList.add('active');
    renderPdf(dish.pdf);
    document.getElementById('pdf-title').textContent = t(dish.name);
    document.getElementById('pdf-back-btn').textContent = UI.back[lang];
    renderCats();
    updateNavArrows();
    if (window.innerWidth < 768) {
      document.body.classList.remove('dish-open');
      document.body.classList.add('pdf-open');
    }
    return;
  }

  document.getElementById('pdf-panel').classList.remove('active');
  document.getElementById('pdf-canvas-container').innerHTML = '';
  document.body.classList.remove('pdf-open');
  document.getElementById('dish-panel').classList.add('active');

  renderDishMedia(dish);
  renderDishInfo(dish);
  renderCats();
  updateNavArrows();

  document.getElementById('dish-info').scrollTop = 0;

  if (window.innerWidth < 768) {
    document.body.classList.add('dish-open');
  }
}

function setPortrait(on) {
  document.getElementById('dish-panel').classList.toggle('portrait', on);
}

function renderDishMedia(dish) {
  const el = document.getElementById('dish-media');
  const btn = el.querySelector('.back-btn');
  const pBtn = document.getElementById('dish-prev');
  const nBtn = document.getElementById('dish-next');
  setPortrait(false);

  if (dish.youtube) {
    el.innerHTML = `<iframe src="https://www.youtube.com/embed/${escHtml(dish.youtube)}?rel=0&modestbranding=1" allowfullscreen></iframe>`;
  } else if (dish.image) {
    const img = document.createElement('img');
    img.alt = t(dish.name);
    img.onload = () => {
      if (window.innerWidth >= 768) {
        setPortrait(img.naturalHeight > img.naturalWidth);
      }
    };
    img.src = escHtml(dish.image);
    el.innerHTML = '';
    el.appendChild(img);
  } else {
    el.innerHTML = `<div class="media-placeholder"><img src="85%20Logo.png" alt="85TD"></div>`;
  }
  el.appendChild(btn);
  if (pBtn) el.appendChild(pBtn);
  if (nBtn) el.appendChild(nBtn);
}

function renderDishInfo(dish) {
  const order = lang === 'zh' ? ['zh','en']
              : lang === 'en' ? ['en','zh']
              : ['ja','zh'];

  const [p, s] = order;
  const nameP = dish.name[p] || '';
  const nameS = dish.name[s] || '';
  const descP = (dish.desc && dish.desc[p]) || '';
  const descS = (dish.desc && dish.desc[s]) || '';

  const priceHtml = dish.prices
    ? `<div class="dish-price-multi">
         ${dish.prices.map(p => `
           <div class="dish-price">
             <span class="price-label">${escHtml(p[lang] || p.zh)}</span>
             <div class="price-inner">
               <span class="price-nt">NT</span>
               <span class="price-num">${p.price.toLocaleString()}</span>
             </div>
           </div>`).join('')}
       </div>`
    : dish.price
    ? `<div class="dish-price">
         <span class="price-nt">NT</span>
         <span class="price-num">${dish.price.toLocaleString()}</span>
         ${dish.perPerson ? `<span class="price-per">${UI.per[lang]}</span>` : dish.unit ? `<span class="price-per">${escHtml(dish.unit[lang] || dish.unit.zh)}</span>` : ''}
       </div>`
    : '';

  const badgeHtml = (dish.badge || []).map(b => {
    const labels = {
      zh: { sig: '招牌', veg: '素食', lacto: '蛋奶素', spicy: '辣' },
      en: { sig: 'Signature', veg: 'Vegan', lacto: 'Lacto-ovo vegetarian', spicy: 'Spicy' },
      ja: { sig: '看板料理', veg: 'ヴィーガン', lacto: '乳卵菜食', spicy: '辛口' },
    };
    const l = labels[lang] || labels.zh;
    return `<span class="badge badge-${b}">${l[b] || b}</span>`;
  }).join(' ');

  document.getElementById('dish-info').innerHTML = `
    <div class="dish-names">
      <div class="name-primary">${fmtName(nameP)}</div>
      ${nameS ? `<div class="name-secondary">${escHtml(nameS)}</div>` : ''}
    </div>
    ${priceHtml}
    ${badgeHtml ? `<div class="badges" style="margin-top:4px">${badgeHtml}</div>` : ''}
    ${(descP || descS) ? `
      <div class="dish-divider"></div>
      ${descP ? `<div class="dish-desc">${fmtDesc(descP)}</div>` : ''}
      ${descS ? `<div class="dish-desc" style="opacity:0.7;font-family:'Cormorant Garamond',Georgia,serif;font-style:italic">${fmtDesc(descS)}</div>` : ''}
    ` : ''}
    <div class="dish-notice">${escHtml(UI.notice[lang])}</div>
  `;
}

// ── Intro / carousel ───────────────────────────────────────
function showIntro() {
  document.body.classList.remove('dish-open');
  document.body.classList.remove('pdf-open');
  const prevId = selDishId;
  selDishId = null;
  document.getElementById('dish-panel').classList.remove('active');
  document.getElementById('pdf-panel').classList.remove('active');
  document.getElementById('pdf-canvas-container').innerHTML = '';
  document.getElementById('intro-panel').style.display = '';
  renderCats();
  startSlide();

  if (prevId) {
    const row = document.querySelector(`[data-dish-id="${prevId}"]`);
    if (row) {
      if (window.innerWidth < 768) {
        setTimeout(() => row.scrollIntoView({ block: 'center', behavior: 'smooth' }), 0);
      } else {
        const scroll = document.getElementById('cat-scroll');
        const sr = scroll.getBoundingClientRect();
        const rr = row.getBoundingClientRect();
        const top = scroll.scrollTop + rr.top - sr.top - (scroll.clientHeight - row.offsetHeight) / 2;
        scroll.scrollTo({ top: Math.max(0, top), behavior: 'smooth' });
      }
      return;
    }
  }

  if (window.innerWidth < 768) {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

function buildIntro() {
  const panel = document.getElementById('intro-panel');
  const slides = MENU.intro || [];

  if (!slides.length) {
    panel.innerHTML = `
      <div class="intro-default">
        <img class="intro-monogram" src="85%20Logo.png" alt="85TD">
        <div class="intro-title-zh">捌伍添第</div>
        <div class="intro-title-en">85TD · TAIPEI 101 · 85F</div>
        <div class="intro-gold-line"></div>
        <div class="intro-copy">
          「捌」八境薈萃——山、川、雲、海、茶、酒、詩、情，無界成宴。<br>
          「伍」五脈並行——天、地、人、時、味，歲月沉積，共聚一席。<br>
          「添」一菜添一景，一杯添一情，點滴漸成馨，歲月釀共鳴。<br>
          「第」以府邸之格迎客，以珍饈之道留賓，饗宴會知音。
        </div>
      </div>`;
    return;
  }

  slides.forEach((s, i) => {
    const div = document.createElement('div');
    div.className = 'slide' + (i === 0 ? ' active' : '');
    if (s.type === 'youtube') {
      div.innerHTML = `<iframe src="https://www.youtube.com/embed/${s.id}?autoplay=1&mute=1&loop=1&playlist=${s.id}&controls=0&rel=0&playsinline=1" allow="autoplay; encrypted-media; fullscreen" allowfullscreen></iframe>`;
    } else {
      div.innerHTML = `<img src="${s.src}" alt="">`;
    }
    panel.appendChild(div);
  });

  if (slides.length > 1) {
    const dotsEl = document.createElement('div');
    dotsEl.className = 'slide-dots';
    slides.forEach((_, i) => {
      const d = document.createElement('div');
      d.className = 'dot' + (i === 0 ? ' active' : '');
      d.onclick = () => goSlide(i);
      dotsEl.appendChild(d);
    });
    panel.appendChild(dotsEl);
  }
}

function startSlide() {
  const slides = MENU.intro || [];
  if (slides.length <= 1) return;
  stopSlide();
  slideTimer = setInterval(() => goSlide((slideIdx + 1) % slides.length), 8000);
}

function stopSlide() {
  clearInterval(slideTimer);
  slideTimer = null;
}

function goSlide(i) {
  document.querySelectorAll('.slide').forEach((s, j) => s.classList.toggle('active', j === i));
  document.querySelectorAll('.dot').forEach((d, j) => d.classList.toggle('active', j === i));
  slideIdx = i;
}

// ── Init ───────────────────────────────────────────────────
window.onload = () => {
  buildIntro();
  renderCats();
  startSlide();
  initPdfTouch();

  document.addEventListener('touchmove', e => {
    if (!selDishId || window.innerWidth >= 768) return;
    const info = document.getElementById('dish-info');
    if (!info.contains(e.target)) e.preventDefault();
  }, { passive: false });

  let swipeX = 0, swipeY = 0;
  document.addEventListener('touchstart', e => {
    swipeX = e.touches[0].clientX;
    swipeY = e.touches[0].clientY;
  }, { passive: true });
  document.addEventListener('touchend', e => {
    if (!selDishId) return;
    const dx = e.changedTouches[0].clientX - swipeX;
    const dy = e.changedTouches[0].clientY - swipeY;
    if (Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy) * 1.5) {
      const { prev, next } = getAdjacentDishes(selDishId);
      if (dx > 0 && prev) selectDish(prev);
      if (dx < 0 && next) selectDish(next);
    }
  }, { passive: true });
};
</script>
